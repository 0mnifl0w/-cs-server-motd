<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Штурмовик</title>
<style>
body {
    background-color: #0a0a0a;
    color: #e0e0e0;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 15px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

.header {
    text-align: center;
    padding: 15px 0;
    border-bottom: 2px solid #ff4444;
}

.header h1 {
    color: #ff4444;
    font-size: 28px;
    margin: 0 0 5px 0;
}

.subtitle {
    color: #888;
    font-size: 12px;
}

.section {
    margin: 20px 0;
    padding: 15px;
    background-color: #1a1a1a;
    border-left: 3px solid #ffaa00;
}

.section-title {
    color: #ffaa00;
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 10px;
}

.stat-row td {
    padding: 8px;
    background-color: #141414;
    border: 1px solid #2a2a2a;
}

.stat-label {
    color: #888;
    font-size: 11px;
    width: 50%;
}

.stat-value {
    color: #44ff44;
    font-size: 14px;
    font-weight: bold;
}

.ability {
    padding: 10px;
    margin: 5px 0;
    background-color: #141414;
}

.ability.buff {
    border-left: 3px solid #00ff00;
}

.ability.debuff {
    border-left: 3px solid #ff4444;
}

.buff-text {
    color: #00ff00;
    font-size: 13px;
}

.debuff-text {
    color: #ff4444;
    font-size: 13px;
}

.footer {
    text-align: center;
    margin-top: 20px;
    padding-top: 15px;
    border-top: 1px solid #333;
    color: #666;
    font-size: 11px;
}
</style>
</head>
<body>

<div class="header">
    <h1>ШТУРМОВИК</h1>
    <div class="subtitle">ASSAULT CLASS</div>
</div>

<div class="section">
    <div class="section-title">ХАРАКТЕРИСТИКИ</div>
    <table class="stat-row">
        <tr>
            <td class="stat-label">Здоровье</td>
            <td class="stat-value">100 HP</td>
            <td class="stat-label">Броня</td>
            <td class="stat-value">10 AP</td>
        </tr>
        <tr>
            <td class="stat-label">Уровень</td>
            <td class="stat-value">140 LVL</td>
            <td class="stat-label">Цена</td>
            <td class="stat-value">15,000</td>
        </tr>
    </table>
</div>

<div class="section">
    <div class="section-title">БАФФЫ</div>
    <div class="ability buff">
        <div class="buff-text">+ Отдача оружия: -40%</div>
    </div>
    <div class="ability buff">
        <div class="buff-text">+ Разброс пуль: -40%</div>
    </div>
    <div class="ability buff">
        <div class="buff-text">+ Скорость: +3%</div>
    </div>
</div>

<div class="section">
    <div class="section-title">ДЕБАФФЫ</div>
    <div class="ability debuff">
        <div class="debuff-text">- Гравитация: +5% (прыгает ниже)</div>
    </div>
</div>

<div class="footer">
    Удачной игры, Игрок!
</div>

</body>
</html>
